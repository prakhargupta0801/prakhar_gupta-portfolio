<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Circle Stroke – Multiple Sections</title>
<style>
  .circle-stroke {
    position: relative;
    overflow: hidden;           /* keep ripples inside */
    min-height: 280px;          /* ensure visible area */
    background: linear-gradient(135deg, #f7f7f7, #eaeaea);
    margin: 16px 0;
    border-radius: 12px;
  }
  .circle-stroke svg {
    position: absolute;
    inset: 0;
    z-index: 0;                 /* behind content */
    display: block;
  }
  .circle-stroke .title,
  .circle-stroke .content {
    position: relative;
    z-index: 1;                 /* above svg */
  }
  .circle-stroke rect { fill: none; pointer-events: all; }
  .circle-stroke circle { fill: none; stroke-width: 1px; }
</style>
</head>
<body>

<section class="circle-stroke">
  <h2 class="title">About Me</h2>
  <p class="content">Move your mouse inside this box to see ripples.</p>
</section>

<section class="circle-stroke">
  <h2 class="title">Skills</h2>
  <p class="content">This is a second independent ripple area.</p>
</section>

<section class="circle-stroke">
  <h2 class="title">Contact</h2>
  <p class="content">And a third one for testing.</p>
</section>

<script src="https://d3js.org/d3.v3.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  (function initAllCircleStroke(selector) {
    var MIN_INTERVAL_MS = 40;    // throttle: min time between circles
    var MIN_DISTANCE_PX = 2;     // spacing: min pointer travel
    var MAX_CIRCLES     = 200;   // cap per section
    var R_START = 5, R_END = 80;
    var STROKE = "#b5b5b557";    // semi-transparent gray
    var STROKE_WIDTH = 10;
    var DURATION = 1600;

    d3.selectAll(selector).each(function(_, idx) {
      var container = d3.select(this);
      var node = this;
      if (!container.select('svg').empty()) return;

      function size() {
        return {
          w: node.clientWidth  || node.offsetWidth  || 0,
          h: node.clientHeight || node.offsetHeight || 0
        };
      }

      var s = size();
      if (s.w === 0 || s.h === 0) {
        container.style('min-height', '280px');
        s = size();
      }

      var svg = container.append("svg")
        .attr("width", s.w)
        .attr("height", s.h);

      svg.append("rect")
        .attr("width", "100%")
        .attr("height", "100%")
        .style("pointer-events", "all")
        .style("fill", "none")
        .on(("ontouchstart" in document) ? "touchmove" : "mousemove", particle);

      var lastTime = 0;
      var lastX = null, lastY = null;

      var resizeNs = "resize.circle-stroke-" + idx;
      d3.select(window).on(resizeNs, function () {
        var s2 = size();
        svg.attr("width", s2.w).attr("height", s2.h);
      });

      function particle() {
        var now = Date.now();
        var m = d3.mouse(this);

        if (now - lastTime < MIN_INTERVAL_MS) { prevent(); return; }

        if (lastX !== null && lastY !== null) {
          var dx = m[0] - lastX, dy = m[1] - lastY;
          if (dx*dx + dy*dy < MIN_DISTANCE_PX*MIN_DISTANCE_PX) { prevent(); return; }
        }

        lastTime = now; lastX = m[0]; lastY = m[1];

        var circles = svg.selectAll("circle");
        var excess = circles.size() - (MAX_CIRCLES - 1);
        if (excess > 0) {
          circles.filter(function(d, i){ return i < excess; }).remove();
        }

        svg.insert("circle", "rect")
          .attr("cx", m[0])
          .attr("cy", m[1])
          .attr("r", R_START)
          .style("stroke", STROKE)
          .style("stroke-width", STROKE_WIDTH)
          .style("stroke-opacity", 1)
          .transition()
          .duration(DURATION)
          .ease("sqrt")
          .attr("r", R_END)
          .style("stroke-opacity", 1e-6)
          .remove();

        prevent();
      }

      function prevent() {
        if (d3.event && d3.event.preventDefault) d3.event.preventDefault();
      }
    });
  })(".circle-stroke");
});
</script>

</body>
</html>
