<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GSAP Rotation roateTube</title>
  <style>
    @font-face {
      font-family: 'Bandeins-Strange';
      src: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/61488/BandeinsStrangeVariableGX.ttf') format('truetype');
      font-stretch: 100% 800%;
      font-weight: 200 800;
      font-display: block;
    }

    :root {
      --fontSize: 4;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: black;
      color: white;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 1000vh; /* long scroll */
    }

    .roatestage {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      visibility: hidden;
    }

    .roatetube {
      position: fixed;
      top: 50vh;
      left: 50vw;
      perspective: 100vw;
    }

    .roatetube__inner {
      position: relative;
      transform-style: preserve-3d;
    }

    .rotateline {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-family: 'Bandeins-Strange';
      font-size: calc(var(--fontSize) * 1vw);
      font-stretch: 800%;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
      transform-style: preserve-3d;
    }
  </style>
</head>
<body>
  <div class="roatestage">
    <div class="roatetube">
      <div class="roatetube__inner">
        <h1 class="rotateline">Rotation</h1>
      </div>
    </div>
  </div>

  <!-- ✅ GSAP + ScrollTrigger CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    console.clear();

    const select = e => document.querySelector(e);
    const roatestage = select('.roatestage');
    const roatetubeInner = select(".roatetube__inner");
    const clone = document.getElementsByClassName("rotateline");
    const numLines = 10;
    const fontSize = gsap.getProperty(':root', '--fontSize');
    const angle = 360/numLines;
    let radius = 0;
    let origin = 0;

    function set3D() {
      let width = window.innerWidth;
      let fontSizePx = (width/100)*fontSize;
      radius = (fontSizePx/2)/Math.sin((180/numLines)*(Math.PI/180));
      origin = `50% 50% -${radius}px`;
    }

    function clodeNode() {
      for (var i = 0; i < (numLines-1); i++) {
        let newClone = clone[0].cloneNode(true);
        let lineClass = "rotateline--"+(i+2);
        newClone.classList.add(lineClass);
        roatetubeInner.appendChild(newClone);
      }
      clone[0].classList.add("rotateline--1");
    }

    function positionTxt() {
      gsap.set('.rotateline', {
        rotationX: function(index) {
          return -angle*index;
        },
        z: radius,
        transformOrigin: origin
      });
    }

    function setProps(targets) {
      targets.forEach(function(target) {
        let paramSet = gsap.quickSetter(target, "css");
        let degrees = gsap.getProperty(target, "rotateX");
        let radians = degrees * (Math.PI/180);
        let conversion = Math.abs(Math.cos(radians) / 2 + 0.5);
        let fontW = 200 + 700*conversion;
        let fontS = `${100 + 700*conversion}%`;

        paramSet({
          opacity: conversion+0.1,
          fontWeight: fontW,
          fontStretch: fontS
        });
      })
    }

    function scrollRotate() {
      gsap.to('.rotateline', {
        scrollTrigger: {
          trigger: '.roatestage',
          scrub: 1,
          start: "top top"
        },
        rotateX: "+=1080",
        onUpdate: function() {
          setProps(this.targets());
        }
      });

      gsap.to('.roatetube', {
        scrollTrigger: {
          trigger: '.roatestage',
          scrub: 1,
          start: "top top"
        },
        perspective: '1vw',
        ease: 'expo.out'
      });

    }

    function init() {
      clodeNode();
      set3D();
      window.onresize = () => {
        set3D();
        positionTxt();
      }
      positionTxt();
      setProps(gsap.utils.toArray(".rotateline"));
      scrollRotate();
      gsap.to(roatestage, { autoAlpha: 1, duration: 2, delay: 2 });
    }

    window.onload = () => {
      init();
    };
  </script>
</body>
</html>
